                - incompatible
                - conditionally_compatible
                - unknown
            confidence:
              $ref: "#/components/schemas/Confidence"
            reason_codes:
              type: array
              items:
                type: string
            explanation:
              type: string
              maxLength: 1000
            safety_related:
              type: boolean
            required_conditions:
              type: array
              items:
                type: string
            escalation:
              $ref: "#/components/schemas/EscalationHint"
            references:
              type: array
              items:
                $ref: "#/components/schemas/Reference"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    OrderResponse:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          type: object
          additionalProperties: false
          required:
            - order_no
            - status
            - escalation
          properties:
            order_no:
              $ref: "#/components/schemas/OrderNumber"
            status:
              type: string
              enum:
                - received
                - processing
                - partially_shipped
                - shipped
                - delivered
                - cancelled
                - returned
                - exception
            placed_date:
              type: string
              format: date
            items:
              type: array
              items:
                type: object
                additionalProperties: false
                required:
                  - sku
                  - name
                  - quantity
                properties:
                  sku:
                    $ref: "#/components/schemas/Sku"
